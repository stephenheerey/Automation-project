name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
        STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
        LOCKED_USERNAME: ${{ secrets.LOCKED_USERNAME }}
        LOCKED_PASSWORD: ${{ secrets.LOCKED_PASSWORD }}
        INVALID_USERNAME: ${{ secrets.INVALID_USERNAME }}
        INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
